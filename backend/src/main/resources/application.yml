spring:
  application:
    name: simple-taobao

  # Nacos 配置
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        namespace: public
        group: DEFAULT_GROUP
      config:
        server-addr: localhost:8848
        namespace: public
        group: DEFAULT_GROUP
        file-extension: yml
        import-check:
          enabled: false

    # Sentinel 配置
    sentinel:
      enabled: true
      transport:
        dashboard: localhost:8080
        port: 8719
      eager: true
      log:
        dir: /tmp/csp/logs

    # Seata 配置
    alibaba:
      seata:
        tx-service-group: my_test_tx_group

  # RocketMQ 配置
  rocketmq:
    name-server: localhost:9876
    producer:
      group: simple-taobao-producer
      send-message-timeout: 3000

  # 数据源配置
  datasource:
    url: jdbc:mysql://localhost:3306/simple_taobao?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: 123456

  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      jedis:
        pool:
          max-active: 8
          max-idle: 8
          max-wait: -1ms
          min-idle: 0
        password: 123456

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.taobao.entity
  configuration:
    map-underscore-to-camel-case: true

server:
  port: 8080

# Seata 客户端配置
seata:
  enabled: true
  application-id: simple-taobao
  tx-service-group: my_test_tx_group
  config:
    type: nacos
    nacos:
      server-addr: localhost:8848
      group: DEFAULT_GROUP
  registry:
    type: nacos
    nacos:
      server-addr: localhost:8848
      group: DEFAULT_GROUP

logging:
  level:
    com.taobao: debug
    com.alibaba.nacos: info
    com.alibaba.cloud.sentinel: info
